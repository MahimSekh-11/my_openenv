spec_version: 1
name: support_ops
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: Tier 1 Customer Support Triaging and Management Environment
version: 1.0.0
entrypoint: support_ops.env:SupportOpsEnv

models:
  action: support_ops.schemas:Action
  observation: support_ops.schemas:Observation
  reward: support_ops.schemas:Reward

tasks:
  - id: "task_easy"
    name: "Task Easy"
    description: "Handle simple missing item report and issue replacement."
    difficulty: "easy"
    grader: "tasks.task_easy.grader:grade"

  - id: "task_medium"
    name: "Task Medium"
    description: "Determine refund eligibility by cross-referencing order date with 30-day corporate policy."
    difficulty: "medium"
    grader: "tasks.task_medium.grader:grade"

  - id: "task_hard"
    name: "Task Hard"
    description: "Adversarial Policy Verification: Decline high-value item immediate refunds and explicitly escalate to Tier 2."
    difficulty: "hard"
    grader: "tasks.task_hard.grader:grade"
