spec_version: "1.0"
name: "support_ops"
description: "Tier 1 Customer Support Triaging and Management Environment"
version: "1.0.0"
entrypoint: "support_ops.env:SupportOpsEnv"
models:
  action: "support_ops.schemas:Action"
  observation: "support_ops.schemas:Observation"
  reward: "support_ops.schemas:Reward"
tasks:
  - id: "task_easy"
    name: "Task Easy"
    description: "Handle simple missing item report and issue replacement."
    score: 0.9
    graders:
      - type: "match"
        score: 0.9
  - id: "task_medium"
    name: "Task Medium"
    description: "Determine refund eligibility by cross-referencing order date with 30-day corporate policy."
    score: 0.9
    graders:
      - type: "match"
        score: 0.9
  - id: "task_hard"
    name: "Task Hard"
    description: "Multi-system correlation resolving an April double-charge glitch."
    score: 0.9
    graders:
      - type: "match"
        score: 0.9
